services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm_analytics
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_analytics_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  crm_analytics_pg:

